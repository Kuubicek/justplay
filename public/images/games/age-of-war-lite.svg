<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E0505"/>
      <stop offset="100%" stop-color="#0A0202"/>
    </linearGradient>
    <radialGradient id="fireglow" cx="50%" cy="52%" r="50%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FF3B0A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF3B0A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="clashglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4B0" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFB347" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sword-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#D4962A"/>
      <stop offset="100%" stop-color="#8B5A12"/>
    </linearGradient>
    <linearGradient id="sword-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E07A28"/>
      <stop offset="100%" stop-color="#8B3A0A"/>
    </linearGradient>
    <filter id="blur-heavy">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blur-mid">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="blur-xs">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Background fire glow -->
  <ellipse cx="320" cy="200" rx="260" ry="180" fill="url(#fireglow)" filter="url(#blur-heavy)"/>

  <!-- Subtle stone-tile pattern -->
  <g opacity="0.07" stroke="#CC4410" stroke-width="1" fill="none">
    <rect x="0" y="0" width="80" height="60"/>
    <rect x="80" y="0" width="80" height="60"/>
    <rect x="160" y="0" width="80" height="60"/>
    <rect x="240" y="0" width="80" height="60"/>
    <rect x="320" y="0" width="80" height="60"/>
    <rect x="400" y="0" width="80" height="60"/>
    <rect x="480" y="0" width="80" height="60"/>
    <rect x="560" y="0" width="80" height="60"/>
    <rect x="40" y="60" width="80" height="60"/>
    <rect x="120" y="60" width="80" height="60"/>
    <rect x="200" y="60" width="80" height="60"/>
    <rect x="360" y="60" width="80" height="60"/>
    <rect x="440" y="60" width="80" height="60"/>
    <rect x="520" y="60" width="80" height="60"/>
  </g>

  <!-- Left sword blade (diagonal) -->
  <line x1="155" y1="68" x2="430" y2="292" stroke="url(#sword-left)" stroke-width="16" stroke-linecap="round"/>
  <!-- Left blade edge glint -->
  <line x1="157" y1="65" x2="432" y2="289" stroke="#FFE0A0" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Right sword blade (diagonal, crossing) -->
  <line x1="485" y1="68" x2="210" y2="292" stroke="url(#sword-right)" stroke-width="16" stroke-linecap="round"/>
  <!-- Right blade edge glint -->
  <line x1="488" y1="65" x2="213" y2="289" stroke="#FFE0A0" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Left sword crossguard -->
  <line x1="116" y1="108" x2="200" y2="58" stroke="#F5C842" stroke-width="10" stroke-linecap="round"/>
  <line x1="116" y1="108" x2="200" y2="58" stroke="#FFE890" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Right sword crossguard -->
  <line x1="524" y1="108" x2="440" y2="58" stroke="#F5C842" stroke-width="10" stroke-linecap="round"/>
  <line x1="524" y1="108" x2="440" y2="58" stroke="#FFE890" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Left pommel -->
  <circle cx="148" cy="72" r="13" fill="#F5C842"/>
  <circle cx="148" cy="72" r="13" stroke="#FFE890" stroke-width="2" fill="none" opacity="0.6"/>
  <circle cx="144" cy="68" r="4" fill="#FFF5CC" opacity="0.5"/>

  <!-- Right pommel -->
  <circle cx="492" cy="72" r="13" fill="#F5C842"/>
  <circle cx="492" cy="72" r="13" stroke="#FFE890" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="488" cy="68" r="4" fill="#FFF5CC" opacity="0.45"/>

  <!-- Clash point glow -->
  <circle cx="320" cy="183" r="50" fill="url(#clashglow)" filter="url(#blur-mid)"/>
  <circle cx="320" cy="183" r="18" fill="#FFE4B0" opacity="0.85"/>
  <circle cx="320" cy="183" r="10" fill="#FFF8E0" opacity="0.95"/>
  <ellipse cx="315" cy="177" rx="5" ry="4" fill="white" opacity="0.7"/>

  <!-- Sparks -->
  <circle cx="292" cy="158" r="5" fill="#FFD700" opacity="0.9" filter="url(#blur-xs)"/>
  <circle cx="292" cy="158" r="3" fill="#FFEC80"/>
  <circle cx="348" cy="155" r="4.5" fill="#FFD700" opacity="0.85" filter="url(#blur-xs)"/>
  <circle cx="348" cy="155" r="2.5" fill="#FFEC80"/>
  <circle cx="305" cy="208" r="4" fill="#FF8C42" opacity="0.9" filter="url(#blur-xs)"/>
  <circle cx="305" cy="208" r="2.5" fill="#FFCC70"/>
  <circle cx="342" cy="212" r="3.5" fill="#FFB347" opacity="0.85"/>
  <circle cx="275" cy="200" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="360" cy="168" r="3" fill="#FF8C42" opacity="0.75"/>
  <circle cx="278" cy="172" r="2.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="364" cy="195" r="2" fill="#FFE070" opacity="0.8"/>
  <circle cx="308" cy="165" r="2" fill="#FFD700" opacity="0.75"/>

  <!-- Small flying embers -->
  <circle cx="245" cy="135" r="2.5" fill="#FF6B35" opacity="0.65"/>
  <circle cx="390" cy="128" r="2" fill="#FF8C42" opacity="0.6"/>
  <circle cx="220" cy="230" r="2" fill="#FF6B35" opacity="0.55"/>
  <circle cx="415" cy="245" r="2.5" fill="#FF8C42" opacity="0.6"/>
  <circle cx="268" cy="248" r="1.5" fill="#FFD700" opacity="0.55"/>
  <circle cx="372" cy="145" r="1.5" fill="#FFB347" opacity="0.6"/>
</svg>
