<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0B2E"/>
      <stop offset="100%" stop-color="#050318"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4A8FF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#9B7EFF" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#6B4EDD" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3B1ECC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B5EFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B5EFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#47E6C7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#47E6C7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DA3FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-heavy">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blur-light">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur-xs">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Ambient background glows -->
  <circle cx="320" cy="180" r="220" fill="url(#glow)" filter="url(#blur-heavy)"/>
  <circle cx="140" cy="90" r="80" fill="url(#teal)" filter="url(#blur-heavy)"/>
  <circle cx="510" cy="260" r="70" fill="url(#blue)" filter="url(#blur-heavy)"/>
  <circle cx="80" cy="260" r="55" fill="url(#glow)" filter="url(#blur-heavy)"/>
  <circle cx="560" cy="80" r="60" fill="url(#teal)" filter="url(#blur-heavy)"/>

  <!-- Grid dots (background texture) -->
  <g opacity="0.12" fill="#9B7EFF">
    <circle cx="80" cy="60" r="2"/><circle cx="160" cy="60" r="2"/><circle cx="240" cy="60" r="2"/>
    <circle cx="320" cy="60" r="2"/><circle cx="400" cy="60" r="2"/><circle cx="480" cy="60" r="2"/><circle cx="560" cy="60" r="2"/>
    <circle cx="80" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="240" cy="120" r="2"/>
    <circle cx="320" cy="120" r="2"/><circle cx="400" cy="120" r="2"/><circle cx="480" cy="120" r="2"/><circle cx="560" cy="120" r="2"/>
    <circle cx="80" cy="180" r="2"/><circle cx="160" cy="180" r="2"/><circle cx="240" cy="180" r="2"/>
    <circle cx="400" cy="180" r="2"/><circle cx="480" cy="180" r="2"/><circle cx="560" cy="180" r="2"/>
    <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="240" cy="240" r="2"/>
    <circle cx="320" cy="240" r="2"/><circle cx="400" cy="240" r="2"/><circle cx="480" cy="240" r="2"/><circle cx="560" cy="240" r="2"/>
    <circle cx="80" cy="300" r="2"/><circle cx="160" cy="300" r="2"/><circle cx="240" cy="300" r="2"/>
    <circle cx="320" cy="300" r="2"/><circle cx="400" cy="300" r="2"/><circle cx="480" cy="300" r="2"/><circle cx="560" cy="300" r="2"/>
  </g>

  <!-- Main orb glow aura -->
  <circle cx="320" cy="180" r="115" fill="url(#glow)" filter="url(#blur-light)"/>

  <!-- Main orb -->
  <circle cx="320" cy="180" r="72" fill="url(#orb)"/>
  <circle cx="320" cy="180" r="72" stroke="#C4A8FF" stroke-width="1.5" fill="none" opacity="0.45"/>

  <!-- Orb highlight -->
  <ellipse cx="298" cy="155" rx="22" ry="16" fill="white" opacity="0.3"/>
  <ellipse cx="292" cy="150" rx="10" ry="7" fill="white" opacity="0.2"/>

  <!-- Orb inner rings -->
  <circle cx="320" cy="180" r="50" stroke="#9B7EFF" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="320" cy="180" r="30" stroke="#C4A8FF" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Small floating orbs - teal -->
  <circle cx="185" cy="115" r="16" fill="#47E6C7" opacity="0.82" filter="url(#blur-xs)"/>
  <circle cx="185" cy="115" r="16" fill="#47E6C7" opacity="0.55"/>
  <ellipse cx="179" cy="109" rx="5" ry="4" fill="white" opacity="0.4"/>

  <circle cx="472" cy="220" r="14" fill="#47E6C7" opacity="0.78" filter="url(#blur-xs)"/>
  <circle cx="472" cy="220" r="14" fill="#47E6C7" opacity="0.6"/>
  <ellipse cx="466" cy="214" rx="4" ry="3" fill="white" opacity="0.35"/>

  <!-- Small floating orbs - blue -->
  <circle cx="145" cy="235" r="12" fill="#4DA3FF" opacity="0.8" filter="url(#blur-xs)"/>
  <circle cx="145" cy="235" r="12" fill="#4DA3FF" opacity="0.62"/>
  <ellipse cx="140" cy="229" rx="4" ry="3" fill="white" opacity="0.38"/>

  <circle cx="500" cy="115" r="11" fill="#4DA3FF" opacity="0.75" filter="url(#blur-xs)"/>
  <circle cx="500" cy="115" r="11" fill="#4DA3FF" opacity="0.6"/>

  <!-- Small floating orbs - purple -->
  <circle cx="410" cy="80" r="10" fill="#9B7EFF" opacity="0.85"/>
  <circle cx="220" cy="275" r="13" fill="#9B7EFF" opacity="0.8" filter="url(#blur-xs)"/>
  <circle cx="220" cy="275" r="13" fill="#9B7EFF" opacity="0.65"/>
  <ellipse cx="214" cy="269" rx="4" ry="3" fill="white" opacity="0.3"/>

  <circle cx="560" cy="175" r="9" fill="#C4A8FF" opacity="0.7"/>
  <circle cx="78" cy="148" r="8" fill="#9B7EFF" opacity="0.65"/>
  <circle cx="380" cy="295" r="8" fill="#47E6C7" opacity="0.7"/>

  <!-- Tiny sparkles -->
  <circle cx="240" cy="100" r="3" fill="#E0D4FF" opacity="0.9"/>
  <circle cx="440" cy="150" r="2.5" fill="#C4A8FF" opacity="0.85"/>
  <circle cx="165" cy="310" r="3" fill="#47E6C7" opacity="0.8"/>
  <circle cx="530" cy="300" r="2.5" fill="#4DA3FF" opacity="0.75"/>
  <circle cx="96" cy="194" r="2" fill="#9B7EFF" opacity="0.8"/>
  <circle cx="585" cy="148" r="2.5" fill="#47E6C7" opacity="0.7"/>
</svg>
